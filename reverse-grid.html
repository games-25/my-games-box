<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リバース・グリッド - Time Attack</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2656558994804135" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: white; text-align: center; margin: 0; height: 100vh; overflow: hidden; touch-action: none; user-select: none; display: flex; flex-direction: column; }
        
        /* 広告枠用の追加スタイル（既存デザインには干渉しません） */
        .ad-space { background: rgba(30, 41, 59, 0.3); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #interstitial-ad { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .ad-window { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #334155; display: flex; flex-direction: column; align-items: center; }
        .ad-close-btn { margin-top: 20px; padding: 12px 24px; background: #fbbf24; color: #451a03; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 18px; }

        @media (min-width: 1200px) {
            .side-ad { position: fixed; top: 0; bottom: 0; width: 160px; z-index: 100; }
            .ad-left { left: 0; } .ad-right { right: 0; }
            .top-ad, .bottom-ad { display: none !important; }
            .container { margin: 0 160px; height: 100%; }
        }
        @media (max-width: 1199px) {
            .side-ad { display: none !important; }
            .top-ad { width: 100%; height: 60px; border-bottom: 1px solid #334155; }
            .bottom-ad { width: 100%; height: 60px; border-top: 1px solid #334155; }
        }

        /* 元のコンテナ設定を維持 */
        .container { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; justify-content: center; position: relative; }
        
        /* 以下、元のCSSをそのまま維持 */
        #game-menu { display: flex; flex-direction: column; gap: 15px; width: 95%; max-width: 450px; }
        .menu-title { font-size: 26px; color: #fbbf24; font-weight: bold; }
        .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .size-btn { padding: 20px; font-size: 18px; font-weight: bold; background: #1e293b; border: 2px solid #38bdf8; color: #38bdf8; border-radius: 12px; cursor: pointer; }
        #game-screen { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 15px; font-size: 18px; font-weight: bold; color: #fbbf24; }
        #grid { display: grid; gap: 4px; background: #334155; padding: 4px; border-radius: 8px; margin-bottom: 20px; }
        .cell { width: 60px; height: 60px; background: #1e293b; border-radius: 4px; transition: background 0.2s; cursor: pointer; }
        .cell.active { background: #38bdf8; box-shadow: 0 0 15px #38bdf8; }
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; border: 3px solid #fbbf24; }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-retry { background: #fbbf24; color: #451a03; }
        .btn-menu { background: #475569; color: white; }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="ad-space side-ad ad-left">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2656558994804135" data-ad-slot="0000000001" data-ad-format="vertical"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div class="ad-space side-ad ad-right">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2656558994804135" data-ad-slot="0000000002" data-ad-format="vertical"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="interstitial-ad">
    <div class="ad-window">
        <div style="color: #94a3b8; font-size: 12px; margin-bottom: 10px;">ADVERTISEMENT</div>
        <div style="width: 300px; height: 250px; background: #000;">
            <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-2656558994804135" data-ad-slot="0000000003"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <button class="ad-close-btn" onclick="closeFullAd()">広告を閉じて進む</button>
    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<div class="container">
    <div class="ad-space top-ad">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2656558994804135" data-ad-slot="0000000004" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-menu">
        <div class="menu-title">🟦 リバース・グリッド</div>
        <p style="color: #94a3b8; font-size: 14px;">すべてのタイルを青く光らせろ！</p>
        <div class="size-grid">
            <button class="size-btn" onclick="startGame(3)">3 × 3</button>
            <button class="size-btn" onclick="startGame(4)">4 × 4</button>
            <button class="size-btn" onclick="startGame(5)">5 × 5</button>
            <button class="size-btn" onclick="startGame(6)">6 × 6</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="stats-bar">
            <span>手数: <span id="moves">0</span></span>
            <span>TIME: <span id="timer">0.00</span>s</span>
        </div>
        <div id="grid"></div>
        <button class="modal-btn btn-menu" onclick="handleMenuAction()">降参して戻る</button>
    </div>

    <div class="ad-space bottom-ad">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2656558994804135" data-ad-slot="0000000005" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>

<div id="result-modal">
    <div class="modal-content">
        <div style="font-size: 32px; font-weight: bold; color: #fbbf24; margin-bottom: 10px;">CLEAR!</div>
        <div id="res-moves" style="font-size: 20px; margin-bottom: 5px;">手数: 0 手</div>
        <div id="res-time" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">タイム: 0.00 秒</div>
        <div class="modal-btns">
            <button class="modal-btn btn-retry" onclick="handleRetryAction()">もう一度挑戦</button>
            <button class="modal-btn btn-menu" onclick="handleMenuAction()">メニューへ戻る</button>
        </div>
    </div>
</div>

<script>
    let size = 3, moves = 0, startTime = 0, timerInterval = null, finalTimeStr = "";
    let gridState = [], particles = [];
    const canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d');

    // --- 広告カウント管理 ---
    let retryCount = parseInt(localStorage.getItem('rg_retry_count') || "0");
    let menuCount = parseInt(localStorage.getItem('rg_menu_count') || "0");
    let pendingAction = null;

    function showFullAd(callback) {
        pendingAction = callback;
        document.getElementById('interstitial-ad').style.display = 'flex';
    }

    function closeFullAd() {
        document.getElementById('interstitial-ad').style.display = 'none';
        if (pendingAction) { pendingAction(); pendingAction = null; }
    }

    function handleRetryAction() {
        retryCount++;
        localStorage.setItem('rg_retry_count', retryCount);
        // リスタートは2の倍数
        if (retryCount % 2 === 0) { showFullAd(() => startGame(size)); } 
        else { startGame(size); }
    }

    function handleMenuAction() {
        menuCount++;
        localStorage.setItem('rg_menu_count', menuCount);
        // メニューへ戻るは3の倍数
        if (menuCount % 3 === 0) { showFullAd(() => location.reload()); } 
        else { location.reload(); }
    }

    // --- ゲームロジックを元のまま維持 ---
    function startGame(s) {
        size = s; moves = 0; startTime = Date.now();
        document.getElementById('game-menu').style.display = 'none';
        document.getElementById('result-modal').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('moves').innerText = '0';
        initGrid();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
        }, 50);
    }

    function initGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        gridEl.innerHTML = '';
        gridState = new Array(size * size).fill(true);
        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell active';
            cell.onclick = () => toggle(i);
            gridEl.appendChild(cell);
        }
        for (let i = 0; i < size * 3; i++) {
            toggle(Math.floor(Math.random() * size * size), true);
        }
        moves = 0;
        document.getElementById('moves').innerText = '0';
    }

    function toggle(idx, isAuto = false) {
        const targets = [idx];
        if (idx % size !== 0) targets.push(idx - 1);
        if (idx % size !== size - 1) targets.push(idx + 1);
        if (idx >= size) targets.push(idx - size);
        if (idx < size * (size - 1)) targets.push(idx + size);
        targets.forEach(t => {
            gridState[t] = !gridState[t];
            const cell = document.getElementById('grid').children[t];
            cell.className = gridState[t] ? 'cell active' : 'cell';
        });
        if (!isAuto) {
            moves++;
            document.getElementById('moves').innerText = moves;
            if (gridState.every(v => v === true)) showClear();
        }
    }

    function showClear() {
        clearInterval(timerInterval);
        finalTimeStr = ((Date.now() - startTime) / 1000).toFixed(2);
        document.getElementById('res-moves').innerText = `手数: ${moves} 手`;
        document.getElementById('res-time').innerText = `タイム: ${finalTimeStr} 秒`;
        setTimeout(() => {
            document.getElementById('result-modal').style.display = 'flex';
            spawnConfetti();
        }, 300);
    }

    function spawnConfetti() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<100; i++) {
            particles.push({ x: Math.random()*canvas.width, y: -20, size: Math.random()*8+4, color: `hsl(${Math.random()*360},80%,60%)`, vx: Math.random()*4-2, vy: Math.random()*5+2 });
        }
        updateConfetti();
    }

    function updateConfetti() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if(p.y > canvas.height) particles.splice(i, 1);
        });
        if(particles.length > 0) requestAnimationFrame(updateConfetti);
    }
</script>
</body>
</html>
