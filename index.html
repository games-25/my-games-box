<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games Box | ミニゲーム集</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2656558994804135" crossorigin="anonymous"></script>

    <style>
        :root { --bg: #020617; --card-bg: #1e293b; --accent: #38bdf8; --text: #f8fafc; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
        .page-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .main-layout { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin: 0 auto; }
        .ad-space { background: rgba(30, 41, 59, 0.3); display: flex; align-items: center; justify-content: center; color: #475569; font-size: 10px; overflow: hidden; }
        .ad-label { border: 1px solid #334155; padding: 2px 8px; border-radius: 4px; }
        .side-ad { width: 160px; min-width: 160px; height: 600px; position: sticky; top: 20px; margin-top: 40px; display: none; }
        .top-ad { width: 100%; height: 60px; margin-bottom: 10px; }
        .bottom-ad { width: 100%; height: 100px; margin-top: 30px; }
        @media (min-width: 1200px) { .side-ad { display: flex; } .top-ad, .bottom-ad { display: none; } .container { margin: 0 auto; } }
        header { padding: 40px 20px 20px 20px; text-align: center; background: linear-gradient(to bottom, #0f172a, var(--bg)); }
        h1 { font-size: 32px; color: var(--gold); margin: 0; letter-spacing: 2px; }
        .subtitle { font-size: 14px; color: var(--accent); font-weight: bold; margin-top: 5px; }
        .container { max-width: 800px; width: 100%; padding: 20px; box-sizing: border-box; }
        .desc-container { position: relative; padding: 20px; background: var(--card-bg); border-radius: 16px; border: 1px solid #334155; margin-bottom: 30px; text-align: center; }
        .ai-badge { position: absolute; top: -10px; right: 20px; background: #334155; color: #94a3b8; font-size: 10px; padding: 2px 10px; border-radius: 10px; border: 1px solid #475569; }
        .game-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .game-grid { grid-template-columns: 1fr 1fr; } }
        .game-card { background: var(--card-bg); border-radius: 20px; border: 1px solid #334155; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; display: flex; flex-direction: column; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .game-title { font-size: 20px; font-weight: bold; color: var(--gold); margin-bottom: 10px; }
        .play-btn { background: var(--accent); color: #020617; padding: 10px; border-radius: 12px; font-weight: bold; text-align: center; }
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid #1e293b; margin-top: auto; }
        .footer-links a { color: #64748b; text-decoration: none; font-size: 13px; margin: 0 10px; }
    </style>
</head>
<body>
<div class="page-wrapper">
    <header><h1>MY GAMES BOX</h1><div class="subtitle">FREE WEB MINI GAMES</div></header>
    <main class="main-layout">
        <aside class="ad-space side-ad"><span class="ad-label">広告</span></aside>
        <div class="container">
            <div class="ad-space top-ad"><span class="ad-label">広告バナー</span></div>
            <div class="desc-container">
                <div class="ai-badge">AI使用</div>
                <div style="font-size: 14px; color: #94a3b8;">隙間時間に最適な脳トレミニゲーム集です。</div>
            </div>
            <div class="game-grid">
                <a href="pittarisutoppu.html" class="game-card">
                    <div class="game-info"><div class="game-title">📏 ぴったりストップ</div><div class="play-btn">PLAY NOW</div></div>
                </a>
                <a href="reverse-grid.html" class="game-card">
                    <div class="game-info"><div class="game-title">🟦 リバース・グリッド</div><div class="play-btn">PLAY NOW</div></div>
                </a>
                <a href="number-tap.html" class="game-card">
                    <div class="game-info"><div class="game-title">🔢 ナンバー・タップ</div><div class="play-btn">PLAY NOW</div></div>
                </a>
            </div>
            <div class="ad-space bottom-ad"><span class="ad-label">広告バナー</span></div>
        </div>
        <aside class="ad-space side-ad"><span class="ad-label">広告</span></aside>
    </main>
    <footer><div class="footer-links"><a href="about.html">このサイトについて</a><a href="privacy-policy.html">プライバシーポリシー</a></div></footer>
</div>
</body>
</html>
